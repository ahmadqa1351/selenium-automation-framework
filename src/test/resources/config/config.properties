# Base Configuration
base.url=https://www.saucedemo.com
browser=chrome
headless=false

# Timeout Settings (in seconds)
explicit.wait.timeout=10
implicit.wait.timeout=5
page.load.timeout=15

# Parallel Execution
parallel.threads=4

# Screenshot Settings
capture.screenshot.on.failure=true
capture.screenshot.on.success=false
screenshot.directory=reports/screenshots

# Report Settings
extent.report.path=reports/extent-reports
extent.report.name=TestExecutionReport
attach.screenshot.to.report=true

# Logging
log.level=INFO
log.file=logs/automation.log

# Test Data
test.data.path=src/test/resources/data

# Browser Options
window.maximize=true
accept.insecure.ssl=true
page.load.strategy=normal

# API Configuration (if required)
api.base.url=https://api.example.com
api.timeout=5000
api.connection.timeout=5000

# Database Configuration (if required)
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/testdb
db.username=root
db.password=password
db.pool.size=5